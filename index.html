<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s infinite ease-in-out;
        }

        .orb1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            bottom: -50px;
            right: -50px;
            animation-delay: 5s;
        }

        .orb3 {
            width: 350px;
            height: 350px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(118, 75, 162, 0.8)); }
        }

        .input-section {
            margin-bottom: 25px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
            color: #fff;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }

        .char-count {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85em;
            pointer-events: none;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 400px;
            height: 400px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(-1px);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 35px;
            padding: 40px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            text-align: center;
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .result::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: shine 3s infinite;
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.9);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shine {
            0% { transform: rotate(0deg) translate(-50%, -50%); }
            100% { transform: rotate(360deg) translate(-50%, -50%); }
        }

        .emoji {
            font-size: 5em;
            margin-bottom: 20px;
            animation: bounce 1s ease;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .sentiment-label {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .positive { 
            color: #10b981;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }
        .negative { 
            color: #ef4444;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
        .neutral { 
            color: #a78bfa;
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
        }

        .confidence {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .score-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .score-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease, background 0.5s ease;
        }

        .analysis-details {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .detail-label {
            font-weight: 600;
        }

        .loader {
            display: none;
            margin-top: 25px;
            text-align: center;
        }

        .spinner-container {
            position: relative;
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
        }

        .spinner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px solid transparent;
            border-top: 3px solid #667eea;
            border-right: 3px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner:nth-child(2) {
            border-top: 3px solid #f093fb;
            border-right: 3px solid #f5576c;
            animation-direction: reverse;
            animation-duration: 1.5s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
        }

        .examples {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .examples-title {
            color: #fff;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .example-link {
            display: block;
            padding: 12px 15px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .example-link:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            transform: translateX(5px);
            color: #fff;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: particleFloat 15s infinite;
        }

        @keyframes particleFloat {
            0% { 
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="container">
        <h1>🎭 Sentiment Analysis</h1>
        
        <div class="input-section">
            <div class="input-wrapper">
                <textarea id="textInput" placeholder="Type or paste your text here... Let's discover the emotion behind your words! ✨" maxlength="500"></textarea>
                <div class="char-count"><span id="charCount">0</span>/500</div>
            </div>
        </div>

        <button id="analyzeBtn">
            <span style="position: relative; z-index: 1;">✨ Analyze Sentiment</span>
        </button>

        <div class="loader" id="loader">
            <div class="spinner-container">
                <div class="spinner"></div>
                <div class="spinner"></div>
            </div>
            <p class="loader-text">Analyzing emotions...</p>
        </div>

        <div class="result" id="result">
            <div class="emoji" id="emoji"></div>
            <div class="sentiment-label" id="sentimentLabel"></div>
            <div class="confidence" id="confidence"></div>
            <div class="score-bar">
                <div class="score-fill" id="scoreFill"></div>
            </div>
            <div class="analysis-details" id="analysisDetails"></div>
        </div>

        <div class="examples">
            <div class="examples-title">✨ Try these examples:</div>
            <div class="example-link" data-text="I absolutely love this! Best experience ever! This makes me so happy! 🌟">💚 Extremely Positive</div>
            <div class="example-link" data-text="This is terrible. I'm very disappointed and frustrated with everything.">💔 Strongly Negative</div>
            <div class="example-link" data-text="The product works as expected. Nothing special, just average quality.">😐 Completely Neutral</div>
            <div class="example-link" data-text="It's okay I guess. Some parts are good, others not so much.">🤷 Mixed Feelings</div>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        const textInput = document.getElementById('textInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const result = document.getElementById('result');
        const loader = document.getElementById('loader');
        const emoji = document.getElementById('emoji');
        const sentimentLabel = document.getElementById('sentimentLabel');
        const confidence = document.getElementById('confidence');
        const scoreFill = document.getElementById('scoreFill');
        const analysisDetails = document.getElementById('analysisDetails');
        const charCount = document.getElementById('charCount');

        // Character counter
        textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length;
        });

        // Enhanced keyword-based sentiment analysis
        function analyzeLocalSentiment(text) {
            const positiveWords = ['love', 'great', 'excellent', 'amazing', 'wonderful', 'fantastic', 'good', 'best', 'happy', 'perfect', 'beautiful', 'awesome', 'brilliant', 'incredible', 'outstanding'];
            const negativeWords = ['hate', 'bad', 'terrible', 'awful', 'horrible', 'worst', 'disappointing', 'poor', 'sad', 'angry', 'disgusting', 'pathetic', 'useless', 'frustrated'];
            
            const lowerText = text.toLowerCase();
            const words = lowerText.split(/\s+/);
            let positiveCount = 0;
            let negativeCount = 0;

            positiveWords.forEach(word => {
                const matches = lowerText.match(new RegExp(word, 'g'));
                if (matches) positiveCount += matches.length;
            });

            negativeWords.forEach(word => {
                const matches = lowerText.match(new RegExp(word, 'g'));
                if (matches) negativeCount += matches.length;
            });

            const totalSentimentWords = positiveCount + negativeCount;
            const wordCount = words.length;

            if (positiveCount > negativeCount) {
                const score = 0.6 + (positiveCount / Math.max(wordCount, 1)) * 0.4;
                return { 
                    sentiment: 'positive', 
                    score: Math.min(score, 0.99),
                    wordCount,
                    positiveWords: positiveCount,
                    negativeWords: negativeCount
                };
            } else if (negativeCount > positiveCount) {
                const score = 0.6 + (negativeCount / Math.max(wordCount, 1)) * 0.4;
                return { 
                    sentiment: 'negative', 
                    score: Math.min(score, 0.99),
                    wordCount,
                    positiveWords: positiveCount,
                    negativeWords: negativeCount
                };
            } else {
                return { 
                    sentiment: 'neutral', 
                    score: 0.5 + (Math.random() * 0.2),
                    wordCount,
                    positiveWords: positiveCount,
                    negativeWords: negativeCount
                };
            }
        }

        async function analyzeSentiment() {
            const text = textInput.value.trim();

            if (!text) {
                textInput.style.borderColor = '#ef4444';
                setTimeout(() => {
                    textInput.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                }, 1000);
                return;
            }

            result.style.display = 'none';
            loader.style.display = 'block';
            analyzeBtn.disabled = true;

            try {
                const response = await fetch(
                    'https://api-inference.huggingface.co/models/distilbert-base-uncased-finetuned-sst-2-english',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ inputs: text })
                    }
                );

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();
                
                if (data && data[0] && Array.isArray(data[0])) {
                    const sentiments = data[0];
                    const topSentiment = sentiments.reduce((prev, current) => 
                        (prev.score > current.score) ? prev : current
                    );

                    const localAnalysis = analyzeLocalSentiment(text);
                    displayResult(
                        topSentiment.label.toLowerCase(), 
                        topSentiment.score,
                        localAnalysis.wordCount,
                        localAnalysis.positiveWords,
                        localAnalysis.negativeWords
                    );
                } else {
                    const localResult = analyzeLocalSentiment(text);
                    displayResult(
                        localResult.sentiment, 
                        localResult.score,
                        localResult.wordCount,
                        localResult.positiveWords,
                        localResult.negativeWords
                    );
                }
            } catch (err) {
                const localResult = analyzeLocalSentiment(text);
                displayResult(
                    localResult.sentiment, 
                    localResult.score,
                    localResult.wordCount,
                    localResult.positiveWords,
                    localResult.negativeWords
                );
            } finally {
                loader.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        }

        function displayResult(sentiment, score, wordCount, positiveWords, negativeWords) {
            const emojiMap = {
                positive: '😊',
                negative: '😠',
                neutral: '😐'
            };

            const labelMap = {
                positive: 'Positive',
                negative: 'Negative',
                neutral: 'Neutral'
            };

            const colorMap = {
                positive: 'linear-gradient(90deg, #10b981, #34d399)',
                negative: 'linear-gradient(90deg, #ef4444, #f87171)',
                neutral: 'linear-gradient(90deg, #a78bfa, #c4b5fd)'
            };

            emoji.textContent = emojiMap[sentiment] || '🤔';
            sentimentLabel.textContent = labelMap[sentiment] || 'Unknown';
            sentimentLabel.className = `sentiment-label ${sentiment}`;
            confidence.textContent = `Confidence Score: ${(score * 100).toFixed(1)}%`;

            scoreFill.style.width = (score * 100) + '%';
            scoreFill.style.background = colorMap[sentiment];

            analysisDetails.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">📝 Word Count:</span>
                    <span>${wordCount}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">✅ Positive Keywords:</span>
                    <span>${positiveWords}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">❌ Negative Keywords:</span>
                    <span>${negativeWords}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">🎯 Overall Sentiment:</span>
                    <span style="color: ${sentiment === 'positive' ? '#10b981' : sentiment === 'negative' ? '#ef4444' : '#a78bfa'}">${labelMap[sentiment]}</span>
                </div>
            `;

            result.style.display = 'block';
        }

        analyzeBtn.addEventListener('click', analyzeSentiment);

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                analyzeSentiment();
            }
        });

        document.querySelectorAll('.example-link').forEach(link => {
            link.addEventListener('click', (e) => {
                textInput.value = e.target.dataset.text;
                charCount.textContent = textInput.value.length;
                analyzeSentiment();
            });
        });
    </script>
</body>
</html>
